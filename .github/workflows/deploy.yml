name: Deploy

on:
  push:
    branches:
      - main
      - adoc

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Asciidoctor
        run: |
          sudo apt-get update
          sudo apt-get install -y asciidoctor

      - name: Build AsciiDoc files
        run: |
          mkdir -p _site
          asciidoctor -a root=$(pwd) -R src -r ./asciidoc/extensions/custom-macros.rb -r ./asciidoc/extensions/generate-index.rb -D _site 'src/**/*.adoc'
          cp -r css _site/ 2>/dev/null || true
          cp favicon.ico _site/ 2>/dev/null || true

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
